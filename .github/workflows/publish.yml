name: Publish

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target registry"
        required: true
        default: "github"
        type: choice
        options:
          - github
          - npm
      bump:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Setup Node.js (GitHub Packages)
        if: github.event.inputs.target != 'npm'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"
          scope: "@captorab"
          cache: "npm"

      - name: Setup Node.js (npm)
        if: github.event.inputs.target == 'npm'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          scope: "@captorab"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Bump version
        env:
          BUMP: ${{ github.event.inputs.bump }}
        run: |
          case "$BUMP" in patch|minor|major) ;; *) echo "Invalid bump type"; exit 1 ;; esac
          npm version "$BUMP" --no-git-tag-version

      - name: Publish to GitHub Packages
        if: github.event.inputs.target != 'npm'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm (OIDC trusted publishing)
        if: github.event.inputs.target == 'npm'
        run: |
          npm install -g npm@latest
          npm publish --access public --registry=https://registry.npmjs.org --provenance

      - name: Commit and push version bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git add package.json package-lock.json
          VERSION=$(node -p "require('./package.json').version")
          git diff --staged --quiet || git commit -m "chore: bump version to $VERSION"
          git push
